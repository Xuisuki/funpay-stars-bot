      <text x="784" y="234"><tspan fill="#6b7594">→ new order </tspan><tspan fill="#8b93a7">#JD4E · </tspan><tspan fill="#febc2e">50★ </tspan><tspan fill="#38bdf8">@user</tspan></text>
